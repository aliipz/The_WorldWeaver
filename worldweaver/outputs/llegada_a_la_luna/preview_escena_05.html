    const TIPOS_CON_SOL = ['amanecer', 'manana_despejada', 'manana_nublada', 'mediodia_soleado', 'atardecer'];
    if (TIPOS_CON_SOL.includes(tipo)) {
        const colorSol = {
            amanecer:          0xff9900,   // dorado-naranja
            manana_despejada:  0xffdd00,   // amarillo brillante
            manana_nublada:    0xffe080,   // amarillo pálido
            mediodia_soleado:  0xffee00,   // amarillo intenso
            atardecer:         0xff4010,   // naranja-rojo
        }[tipo] ?? 0xffdd00;
        // Sol en el borde del cilindro (R=22): para amanecer/atardecer en el horizonte,
        // para el resto en lo alto. Tamaño escalado para mantener aspecto visual correcto.
        const R = 24;  // borde del cilindro exterior
        const radioSol = {
            amanecer:         1.1,
            atardecer:        1.3,
            mediodia_soleado: 0.55,
            manana_despejada: 0.65,
            manana_nublada:   0.70,
        }[tipo] ?? 0.65;

        const p   = cielo.pos_sol;
        const len = Math.sqrt(p.x * p.x + p.y * p.y + p.z * p.z) || 1;
        const nx = p.x / len, ny = p.y / len, nz = p.z / len;

        const esHorizonte = ['amanecer', 'atardecer'].includes(tipo);
        const pos = {
            x: nx * R,
            // Horizonte: justo a la altura de los ojos (y≈2). Alto: sube según elevación.
            y: esHorizonte ? 2.0 + ny * 2.0 : ny * 14 + 4.0,
            z: nz * R,
        };

        const sol = new THREE.Mesh(
            new THREE.SphereGeometry(radioSol, 20, 20),
            new THREE.MeshBasicMaterial({ color: colorSol, fog: false })
        );
        sol.position.set(pos.x, pos.y, pos.z);
        scene.add(sol);

        // Halo difuso
        const haloMat = new THREE.MeshBasicMaterial({ color: colorSol, transparent: true, opacity: 0.12, fog: false });
        const halo = new THREE.Mesh(new THREE.SphereGeometry(radioSol * 2.8, 20, 20), haloMat);
        halo.position.copy(sol.position);
        scene.add(halo);

        animados.push({ update: t => {
            haloMat.opacity = 0.08 + 0.06 * Math.sin(t * 0.35);
        }});
    }

    // ── Luna + estrellas (solo noche despejada — noche_cerrada tiene nubes) ──
    if (tipo === 'noche_estrellada') {
        // Luna — en el borde del cilindro, alta pero visible
        const luna = new THREE.Mesh(
            new THREE.SphereGeometry(1.4, 20, 20),
            new THREE.MeshBasicMaterial({ color: 0xffffff, fog: false })
        );
        luna.position.set(-14, 14, -16);
        scene.add(luna);

        const haloLunaMat = new THREE.MeshBasicMaterial({ color: 0xddeeff, transparent: true, opacity: 0.09, fog: false });
        const haloLuna = new THREE.Mesh(new THREE.SphereGeometry(2.6, 20, 20), haloLunaMat);
        haloLuna.position.copy(luna.position);
        scene.add(haloLuna);
        animados.push({ update: t => { haloLunaMat.opacity = 0.06 + 0.04 * Math.sin(t * 0.28); } });

        // Estrellas en grupos independientes — cada grupo parpadea a su propio ritmo
        const totalEstrellas = 420;
        const numGrupos      = 9;
        const porGrupo       = Math.ceil(totalEstrellas / numGrupos);

        for (let g = 0; g < numGrupos; g++) {
            const N   = g < numGrupos - 1 ? porGrupo : totalEstrellas - porGrupo * (numGrupos - 1);
            const pos = new Float32Array(N * 3);
            const esPrincipal = g < numGrupos * 0.7;  // 70% estrellas blancas, 30% azuladas
            const phiMax = esPrincipal ? 0.52 : 0.42;
            // Radio al borde del cilindro exterior (~22-24 u). sizeAttenuation escala el
            // tamaño con la distancia, así que size también sube proporcionalmente (~4×).
            const radio  = esPrincipal ? 22 + Math.random() * 1.5 : 23 + Math.random() * 1.0;

            for (let i = 0; i < N; i++) {
                const theta = Math.random() * Math.PI * 2;
                const phi   = Math.random() * Math.PI * phiMax;
                pos[i * 3]     = radio * Math.sin(phi) * Math.cos(theta);
                pos[i * 3 + 1] = radio * Math.cos(phi) + 2.5;
                pos[i * 3 + 2] = radio * Math.sin(phi) * Math.sin(theta);
            }
            const geo = new THREE.BufferGeometry();
            geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            const mat = new THREE.PointsMaterial({
                color: esPrincipal ? 0xffffff : 0xc8dcff,
                size:  esPrincipal ? 0.24 : 0.14,
                sizeAttenuation: true,
                transparent: true,
                opacity: 0.9,
                fog: false,
            });
            scene.add(new THREE.Points(geo, mat));

            // Ritmo propio: fase y velocidad distintas por grupo
            // ampMin bajo para que lleguen casi a apagarse en el valle del seno
            const fase   = g * (Math.PI * 2 / numGrupos) + Math.random() * 1.2;
            const vel    = 0.45 + Math.random() * 0.55;
            const ampMin = 0.05 + Math.random() * 0.15;   // 0.05–0.20 (antes 0.45–0.65)
            animados.push({ update: t => {
                mat.opacity = ampMin + (1 - ampMin) * Math.abs(Math.sin(t * vel + fase));
            }});
        }
    }

    // ── Cielo mágico: domo degradado + aurora ────────────────────────────────
    if (tipo === 'cielo_magico') {
        scene.background = null;
        _domeDegradado(scene, [
            { t: 0.0,  color: new THREE.Color('#04010c') },
            { t: 0.35, color: new THREE.Color('#1a0440') },
            { t: 0.50, color: new THREE.Color('#3a0870') },
            { t: 0.62, color: new THREE.Color('#20a080') },  // aurora teal
            { t: 0.72, color: new THREE.Color('#8010c0') },  // violeta intenso
            { t: 0.85, color: new THREE.Color('#200850') },
            { t: 1.0,  color: new THREE.Color('#04010c') },
        ]);

        // Franjas de aurora animadas
        const auroraColors = [0x20e0a0, 0x8020e0, 0x40a0ff, 0xe040a0];
        const franjas = [];
        for (let i = 0; i < 4; i++) {
            const mat = new THREE.MeshBasicMaterial({
                color: auroraColors[i], transparent: true, opacity: 0,
                side: THREE.DoubleSide, depthWrite: false,
            });
            const franja = new THREE.Mesh(new THREE.PlaneGeometry(12, 0.6 + rng(0, 0.4)), mat);
            franja.rotation.x = Math.PI / 2 - 0.3 + rng(-0.1, 0.1);
            franja.position.set(rng(-2, 2), 5.0 + i * 0.5, rng(-3, -1));
            scene.add(franja);
            franjas.push({ mat, fase: i * 1.3 + rng(0, 1), vel: 0.3 + rng(0, 0.25) });
        }
        // Estrellas visibles en cielo mágico
        const N = 200, posE = new Float32Array(N * 3);
        for (let i = 0; i < N; i++) {
            const theta = Math.random() * Math.PI * 2, phi = Math.random() * Math.PI * 0.5;
            const r = 5.2 + Math.random() * 0.4;
            posE[i*3] = r*Math.sin(phi)*Math.cos(theta); posE[i*3+1] = r*Math.cos(phi)+2.5; posE[i*3+2] = r*Math.sin(phi)*Math.sin(theta);
        }
        const geoE = new THREE.BufferGeometry(); geoE.setAttribute('position', new THREE.BufferAttribute(posE, 3));
        const matE = new THREE.PointsMaterial({ color: 0xeeccff, size: 0.05, transparent: true, opacity: 0.8 });
        scene.add(new THREE.Points(geoE, matE));
        animados.push({ update: t => {
            for (const f of franjas) f.mat.opacity = 0.08 + 0.12 * Math.abs(Math.sin(t * f.vel + f.fase));
            matE.opacity = 0.6 + 0.4 * Math.sin(t * 0.5);
        }});
    }

    // ── Niebla densa: partículas de niebla flotante ───────────────────────────
    if (tipo === 'niebla_densa') {
        const N = 400, pos = new Float32Array(N * 3);
        for (let i = 0; i < N; i++) {
            pos[i*3] = rng(-6, 6); pos[i*3+1] = rng(0, 5); pos[i*3+2] = rng(-6, 6);
        }
        const geo = new THREE.BufferGeometry(); geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
        const mat = new THREE.PointsMaterial({ color: 0xdde0e4, size: 0.15, transparent: true, opacity: 0.18, sizeAttenuation: true });
        const puntos = new THREE.Points(geo, mat);
        scene.add(puntos);
        animados.push({ update: t => {
            const a = puntos.geometry.attributes.position;
            for (let i = 0; i < N; i++) {
                a.setX(i, a.getX(i) + Math.sin(t * 0.2 + i) * 0.002);
                a.setY(i, a.getY(i) + Math.sin(t * 0.15 + i * 0.7) * 0.001);
            }
            a.needsUpdate = true;
            mat.opacity = 0.14 + 0.06 * Math.sin(t * 0.3);
        }});
    }

    // ── Nubes ─────────────────────────────────────────────────────────────────
    const TIPOS_CON_NUBES = ['amanecer', 'manana_despejada', 'manana_nublada', 'mediodia_soleado', 'atardecer', 'noche_cerrada', 'tormenta', 'lluvia_suave', 'dia_nevado', 'niebla_densa'];
    if (TIPOS_CON_NUBES.includes(tipo)) {
        const cfg = {
            amanecer:          { n: 5,  color: 0xff9966, op: 0.68 },
            manana_despejada:  { n: 4,  color: 0xffffff, op: 0.68 },
            manana_nublada:    { n: 10, color: 0xd8dde2, op: 0.90 },
            mediodia_soleado:  { n: 2,  color: 0xffffff, op: 0.60 },
            atardecer:         { n: 6,  color: 0xff8855, op: 0.72 },
            noche_cerrada:     { n: 5,  color: 0x101018, op: 0.80 },
            tormenta:          { n: 13, color: 0x404850, op: 0.92 },
            lluvia_suave:      { n: 9,  color: 0x6878a0, op: 0.82 },
            dia_nevado:        { n: 11, color: 0xe8ecf0, op: 0.92 },
            niebla_densa:      { n: 8,  color: 0xd0d4d8, op: 0.60 },
        }[tipo];

        const mat = new THREE.MeshBasicMaterial({ color: cfg.color, transparent: true, opacity: cfg.op });
        const pivotes = [];

        for (let i = 0; i < cfg.n; i++) {
            const pivote = new THREE.Group();
            pivote.rotation.y = (i / cfg.n) * Math.PI * 2 + rng(0, 0.5);
            scene.add(pivote);

            const nube = new THREE.Group();
            nube.position.set(rng(2.8, 4.8), rng(4.0, 6.0), 0);
            pivote.add(nube);

            const nBolas = 4 + Math.floor(rng(0, 4));
            for (let j = 0; j < nBolas; j++) {
                const r    = rng(0.20, 0.42);
                const bola = new THREE.Mesh(new THREE.SphereGeometry(r, 7, 7), mat);
                bola.position.set(
                    (j - nBolas / 2) * rng(0.24, 0.40) + rng(-0.08, 0.08),
                    rng(-0.14, 0.14),
                    rng(-0.08, 0.08)
                );
                nube.add(bola);
            }

            pivotes.push({ pivote, vel: 0.00005 + rng(0, 0.00009), nube, baseY: nube.position.y });
        }

        animados.push({ update: t => {
            for (const { pivote, vel, nube, baseY } of pivotes) {
                pivote.rotation.y += vel;
                nube.position.y = baseY + 0.09 * Math.sin(t * 0.22 + pivote.rotation.y * 4);
            }
        }});
    }

    // ── Lluvia ────────────────────────────────────────────────────────────────
    if (['tormenta', 'lluvia_suave'].includes(tipo)) {
        const intensidad = tipo === 'tormenta' ? 0.75 : 0.45;
        const N = tipo === 'tormenta' ? 900 : 500;
        const pos = new Float32Array(N * 3);
        for (let i = 0; i < N; i++) {
            pos[i * 3]     = rng(-6.5, 6.5);
            pos[i * 3 + 1] = rng(0, 10);
            pos[i * 3 + 2] = rng(-6.5, 6.5);
        }
        const geo = new THREE.BufferGeometry();
        geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
        const matL = new THREE.PointsMaterial({ color: 0x8899cc, size: 0.04, transparent: true, opacity: intensidad });
        const puntos = new THREE.Points(geo, matL);
        scene.add(puntos);

        animados.push({ update: () => {
            const a = puntos.geometry.attributes.position;
            for (let i = 0; i < N; i++) {
                const y = a.getY(i) - 0.10;
                a.setY(i, y < 0 ? 10 : y);
            }
            a.needsUpdate = true;
        }});
    }

    // ── Nieve ─────────────────────────────────────────────────────────────────
    if (tipo === 'dia_nevado') {
        const N = 350;
        const pos   = new Float32Array(N * 3);
        const phaseX = new Float32Array(N);  // fase individual deriva horizontal
        const freqX  = new Float32Array(N);  // frecuencia deriva
        const velY   = new Float32Array(N);  // velocidad caída
        for (let i = 0; i < N; i++) {
            pos[i * 3]     = rng(-6.5, 6.5);
            pos[i * 3 + 1] = rng(0, 10);
            pos[i * 3 + 2] = rng(-6.5, 6.5);
            phaseX[i] = rng(0, Math.PI * 2);
            freqX[i]  = 0.18 + rng(0, 0.22);
            velY[i]   = 0.028 + rng(0, 0.022);
        }
        const geo = new THREE.BufferGeometry();
        geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
        const matN = new THREE.PointsMaterial({
            color: 0xf0f4ff, size: 0.08, transparent: true, opacity: 0.80, sizeAttenuation: true,
        });
        const puntos = new THREE.Points(geo, matN);
        scene.add(puntos);

        animados.push({ update: t => {
            const a = puntos.geometry.attributes.position;
            for (let i = 0; i < N; i++) {
                let y = a.getY(i) - velY[i];
                let x = a.getX(i) + Math.sin(t * freqX[i] + phaseX[i]) * 0.004;
                if (y < 0) { y = 10; x = rng(-6.5, 6.5); }
                a.setY(i, y);
                a.setX(i, x);
            }
            a.needsUpdate = true;
        }});
    }

    // ── Update ────────────────────────────────────────────────────────────────
    function update(t) {
        for (const a of animados) a.update(t);
    }

    return { update };
};

// ── Cielo / iluminación atmosférica ──────────────────────────────────────
(function aplicarCielo(cielo) {
    if (!cielo) return;
    scene.background = new THREE.Color(cielo.color_fondo);
    renderer.setClearColor(cielo.color_fondo);

    // interior_luminoso trae un ambiente muy alto (≈1.0) que, sobre paredes claras,
    // satura la sala a blanco ("no se ve nada"). Lo topamos para que el interior se lea.
    const intensidadAmb = (cielo.tipo === 'interior_luminoso')
        ? Math.min(cielo.intensidad_ambiente, 0.62)
        : cielo.intensidad_ambiente;
    const luz = new THREE.AmbientLight(cielo.color_ambiente, intensidadAmb);
    scene.add(luz);

    // Clamp de seguridad: el renderer (r128) no tiene tone mapping, así que cualquier
    // luz >1.0 recorta a blanco puro. Los presets diurnos antiguos traían soles de
    // 1.6–2.4 que quemaban las superficies de albedo medio (piel, suelo) a blanco.
    // Topamos a 1.2 para que las escenas diurnas dejen de sobreexponerse; las de
    // noche/tormenta (sol <1.0) no se ven afectadas.
    const intensidadSol = Math.min(cielo.intensidad_sol, 1.2);
    const sol = new THREE.DirectionalLight(cielo.color_sol, intensidadSol);
    const p = cielo.pos_sol;
    sol.position.set(p.x, p.y, p.z);
    sol.castShadow = true;
    sol.shadow.mapSize.setScalar(1024);
    sol.shadow.camera.near   =  0.5;
    sol.shadow.camera.far    = 30;
    sol.shadow.camera.left   = -9;
    sol.shadow.camera.right  =  9;
    sol.shadow.camera.top    =  9;
    sol.shadow.camera.bottom = -9;
    sol.shadow.bias          = -0.001;
    scene.add(sol);

    if (cielo.niebla) {
        scene.fog = new THREE.Fog(cielo.niebla.color, cielo.niebla.near, cielo.niebla.far);
    }
})(CIELO_CONFIG ?? SCENE_GRAPH.cielo);

(function() {
    if (!AUDIO_DATA?.url_preview) return;

    const audio = document.createElement('audio');
    audio.src    = AUDIO_DATA.url_preview;
    audio.loop   = true;
    audio.volume = 0;
    document.body.appendChild(audio);

    const btn    = document.getElementById('audio-btn');
    const slider = document.getElementById('audio-vol');
    const ctrl   = document.getElementById('audio-ctrl');
    if (ctrl) ctrl.style.display = 'flex';

    // La música es FONDO: aunque el Músico genere un volumen alto (algunos mundos
    // traen 0.6), lo capamos para que no tape los SFX de acción. El usuario puede
    // subirlo/bajarlo con el slider (persistido en localStorage).
    const VOL_MAX = 0.5;
    const VOL_DEF = Math.min(AUDIO_DATA.volumen ?? 0.25, 0.32);
    let volTarget = VOL_DEF;
    const guardado = parseFloat(localStorage.getItem('ww_music_vol'));
    if (!isNaN(guardado)) volTarget = Math.min(VOL_MAX, Math.max(0, guardado));

    let silenciado = false;
    if (slider) { slider.max = VOL_MAX; slider.value = volTarget; }

    // Fade in al cargar — requiere gesto del usuario (política del browser)
    function iniciarAudio() {
        audio.play().then(() => {
            btn.classList.add('sonando');
            // Fade in suave en 3 segundos hasta el volumen objetivo actual
            let v = 0;
            const step = Math.max(volTarget, 0.0001) / 60;
            const fade = setInterval(() => {
                v = Math.min(v + step, volTarget);
                if (!silenciado) audio.volume = v;
                if (v >= volTarget) clearInterval(fade);
            }, 50);
        }).catch(() => {});
    }

    // El browser bloquea autoplay sin gesto — arrancamos en el primer click/tecla
    const arrancar = () => { iniciarAudio(); document.removeEventListener('click', arrancar); document.removeEventListener('keydown', arrancar); };
    document.addEventListener('click', arrancar);
    document.addEventListener('keydown', arrancar);

    btn.textContent = '🔊';
    window.toggleAudio = function() {
        silenciado = !silenciado;
        audio.volume = silenciado ? 0 : volTarget;
        btn.textContent = silenciado ? '🔇' : '🔊';
    };

    if (slider) {
        slider.addEventListener('input', () => {
            volTarget = parseFloat(slider.value);
            localStorage.setItem('ww_music_vol', String(volTarget));
            if (!silenciado) audio.volume = volTarget;
        });
        // Evita que arrastrar el slider cuente como gesto de movimiento/click 3D
        slider.addEventListener('click',     e => e.stopPropagation());
        slider.addEventListener('mousedown', e => e.stopPropagation());
    }
})();

// ── Controles FPS ─────────────────────────────────────────────────────────
let fpsModo = false;
let fpsYaw = 0, fpsPitch = 0;
const fpsKeys = {};
const FPS_VELOCIDAD = 0.045;
const FPS_ALTURA    = 1.8;
const FPS_SENSIBILIDAD = 0.0022;

// Ambientes sin suelo firme → flotación sutil de cámara (espacio, luna, fondo marino).
const _AMBIENTE_FLOTANTE = ['espacio', 'superficie_planeta', 'bajo_el_agua']
    .includes(SCENE_GRAPH.tipo_ambiente);
const _AMBIENTE_AGUA = SCENE_GRAPH.tipo_ambiente === 'bajo_el_agua';

// Caminar SOBRE el agua (suelo de agua animada): pisada firme + chapoteos.
// En 'barco' se activa solo al DESEMBARCAR (ver _enModoAgua).
const _SOBRE_AGUA = SCENE_GRAPH.tipo_ambiente === 'sobre_agua';
let _pasoDist = 0, _prevPX = null, _prevPZ = null;  // cadencia de pisadas por distancia

// Barco: empiezas en la cubierta; puedes bajar al agua (tecla B) y volver a subir (B).
const _ES_BARCO = SCENE_GRAPH.tipo_ambiente === 'barco';
let _enBarco = _ES_BARCO;   // true = en cubierta, false = caminando sobre el agua
let _enModoAgua = false;    // true tras desembarcar → activa los chapoteos
let _transBarco = null;     // transición de cámara subir/bajar {t0, dur, fromY, toY, despues}

const elOverlay    = document.getElementById('fps-overlay');
const elCrosshair  = document.getElementById('crosshair');
const elHint       = document.getElementById('hint');
const elBtnModo    = document.getElementById('btn-modo');

// Inicializar strings de UI según idioma
(function _initUI() {

    _s('ley-fondo',     _wwUI('leyenda_fondo'));

function toggleModo() {
    if (window._introActiva) return;
    fpsModo ? salirFPS() : entrarFPS();
}

function entrarFPS() {
    fpsModo = true;
    controls.enabled = false;

    // Derivar yaw/pitch desde la orientación actual de la cámara
    // (para que la transición sea suave)
    camera.rotation.order = 'YXZ';
    fpsYaw   = camera.rotation.y;
    fpsPitch = camera.rotation.x;

    // Fijar posición de los ojos
    camera.position.y = FPS_ALTURA;

    elCrosshair.style.display = 'block';
    tooltip.style.display     = 'none';   // ocultar el tooltip de hover al entrar a FPS
    elHint.textContent = _wwUI('hint_fps');
    elBtnModo.textContent = _wwUI('modo_orbit');
    elBtnModo.classList.add('fps-activo');

    renderer.domElement.requestPointerLock();
}

function salirFPS() {
    fpsModo = false;
    controls.enabled = true;
    if (document.pointerLockElement) document.exitPointerLock();

    // Restaurar cámara al punto de partida del modo órbita
    camera.rotation.order = 'XYZ';
    camera.position.set(0, 1.8, 0);
    camera.rotation.set(0, 0, 0);
    controls.target.set(0, 1.8, -3);

    elOverlay.style.display   = 'none';
    elCrosshair.style.display = 'none';
    tooltip.style.display     = 'none';
    elHint.textContent = _wwUI('hint_orbit');
    elBtnModo.textContent = _wwUI('modo_fps');
    elBtnModo.classList.remove('fps-activo');
}

(function _initPausa() {

    // Clic en el fondo del overlay (o en el texto "clic para continuar") → reanudar.

    elOverlay.addEventListener('click', (e) => {

    document.getElementById('ec-yes')?.addEventListener('click', (e) => {

// ── Portal de transición ──────────────────────────────────────────────────
let _portalGrupo          = null;
let _portalLuz            = null;
let _portalAnillo1        = null;
let _portalAnillo2        = null;
let _portalActivado       = false;
let _portalTransicionInicio = null;
let _portalPosFinal         = null;
const _elPortalHint  = document.getElementById('portal-hint');
const _elPortalFlash = document.getElementById('portal-flash');

function _reproducirSonidoPortal() {
    try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const t0  = ctx.currentTime;

        function _osc(type, f0, f1, vol, dur, delay) {
            const o = ctx.createOscillator(), g = ctx.createGain();
            o.type = type;
            o.frequency.setValueAtTime(f0, t0 + delay);
            o.frequency.exponentialRampToValueAtTime(f1, t0 + delay + dur);
            g.gain.setValueAtTime(0.001, t0 + delay);
            g.gain.linearRampToValueAtTime(vol, t0 + delay + dur * 0.18);
            g.gain.exponentialRampToValueAtTime(0.001, t0 + delay + dur);
            o.connect(g); g.connect(ctx.destination);
            o.start(t0 + delay); o.stop(t0 + delay + dur);
        }
        // Rumble ascendente — columna vertebral del sonido
        _osc('sine',     75,   1400, 0.30, 1.0, 0.0);
        // Armónico mágico — shimmer etéreo
        _osc('triangle', 310,  3800, 0.14, 0.9, 0.05);
        // Destello agudo — llegada a la luz
        _osc('sine',     1800, 10000, 0.07, 0.55, 0.42);

        // Whoosh de ruido — viento de teletransporte
        const bufLen = Math.ceil(ctx.sampleRate * 1.0);
        const buf = ctx.createBuffer(1, bufLen, ctx.sampleRate);
        const d   = buf.getChannelData(0);
        for (let i = 0; i < bufLen; i++) d[i] = Math.random() * 2 - 1;
        const src  = ctx.createBufferSource();
        src.buffer = buf;
        const filt = ctx.createBiquadFilter();
        filt.type  = 'bandpass';
        filt.frequency.setValueAtTime(280, t0);
        filt.frequency.exponentialRampToValueAtTime(7000, t0 + 1.0);
        filt.Q.value = 1.1;
        const gn = ctx.createGain();
        gn.gain.setValueAtTime(0.001, t0);
        gn.gain.linearRampToValueAtTime(0.22, t0 + 0.13);
        gn.gain.exponentialRampToValueAtTime(0.001, t0 + 1.0);
        src.connect(filt); filt.connect(gn); gn.connect(ctx.destination);
        src.start(t0); src.stop(t0 + 1.0);
    } catch(e) {}
}

function _reproducirSonidoLlegada() {
    try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const t0  = ctx.currentTime;

        function _osc(type, f0, f1, vol, dur, delay) {
            const o = ctx.createOscillator(), g = ctx.createGain();
            o.type = type;
            o.frequency.setValueAtTime(f0, t0 + delay);
            o.frequency.exponentialRampToValueAtTime(f1, t0 + delay + dur);
            g.gain.setValueAtTime(0.001, t0 + delay);
            g.gain.linearRampToValueAtTime(vol, t0 + delay + dur * 0.08);
            g.gain.exponentialRampToValueAtTime(0.001, t0 + delay + dur);
            o.connect(g); g.connect(ctx.destination);
            o.start(t0 + delay); o.stop(t0 + delay + dur);
        }
        // Rumble que cae — aterrizaje
        _osc('sine',     1400,  75,  0.28, 0.85, 0.0);
        // Shimmer descendente
        _osc('triangle', 3800, 310,  0.13, 0.75, 0.0);
        // Ping de llegada — nota final de materialización
        _osc('sine',     880,   880, 0.12, 0.35, 0.55);

        // Whoosh inverso: del agudo al grave
        const bufLen = Math.ceil(ctx.sampleRate * 0.9);
        const buf = ctx.createBuffer(1, bufLen, ctx.sampleRate);
        const d   = buf.getChannelData(0);
        for (let i = 0; i < bufLen; i++) d[i] = Math.random() * 2 - 1;
        const src  = ctx.createBufferSource();
        src.buffer = buf;
        const filt = ctx.createBiquadFilter();
        filt.type  = 'bandpass';
        filt.frequency.setValueAtTime(6000, t0);
        filt.frequency.exponentialRampToValueAtTime(200, t0 + 0.9);
        filt.Q.value = 1.1;
        const gn = ctx.createGain();
        gn.gain.setValueAtTime(0.001, t0);
        gn.gain.linearRampToValueAtTime(0.18, t0 + 0.10);
        gn.gain.exponentialRampToValueAtTime(0.001, t0 + 0.9);
        src.connect(filt); filt.connect(gn); gn.connect(ctx.destination);
        src.start(t0); src.stop(t0 + 0.9);
    } catch(e) {}
}

window.spawnPortal = function() {
    if (_portalGrupo) return;

    const _esFin  = !NEXT_SCENE_URL;
    const _esQuiz = !!NEXT_SCENE_URL && /quiz\.html(\?|$)/.test(NEXT_SCENE_URL);
    // Portal naranja/dorado para finales (fin de historia o cuestionario final educativo);
    // azul para la transición a la siguiente escena.
    const _c = (_esFin || _esQuiz)
        ? { main: 0xffaa33, emissive: 0x552200, core: 0xffeebb, ring: 0xffcc44,
            light: 0xff9922, lightExt: 0xff6611, particle: 0xffddaa }
        : { main: 0x6699ff, emissive: 0x112299, core: 0xccddff, ring: 0x88aaff,
            light: 0x4488ff, lightExt: 0x9966ff, particle: 0xaaccff };

    // El fin de historia fija su texto; el resto respeta la etiqueta inyectada por el
    // ensamblador (cuestionario final para el quiz, portal de transición por defecto).
    if (_esFin) _elPortalHint.innerHTML = '✦ &nbsp;fin de la historia';

    const g = new THREE.Group();

    // Esfera exterior
    g.add(new THREE.Mesh(
        new THREE.SphereGeometry(0.72, 32, 32),
        new THREE.MeshPhongMaterial({
            color: _c.main, emissive: _c.emissive, emissiveIntensity: 0.6,
            transparent: true, opacity: 0.28, shininess: 400,
            side: THREE.DoubleSide, depthWrite: false,
        })
    ));

    // Núcleo interior brillante
    g.add(new THREE.Mesh(
        new THREE.SphereGeometry(0.30, 16, 16),
        new THREE.MeshBasicMaterial({
            color: _c.core, transparent: true, opacity: 0.65, depthWrite: false,
        })
    ));

    // Anillo ecuatorial
    const _matAnillo = new THREE.MeshBasicMaterial({
        color: _c.ring, transparent: true, opacity: 0.55,
        side: THREE.DoubleSide, depthWrite: false,
    });
    _portalAnillo1 = new THREE.Mesh(new THREE.TorusGeometry(0.82, 0.04, 8, 64), _matAnillo);
    _portalAnillo2 = new THREE.Mesh(new THREE.TorusGeometry(0.82, 0.03, 8, 64), _matAnillo.clone());
    _portalAnillo2.rotation.x = Math.PI / 2.2;
    g.add(_portalAnillo1);
    g.add(_portalAnillo2);

    _portalLuz = new THREE.PointLight(_c.light, 4.5, 7);
    g.add(_portalLuz);

    const luzExt = new THREE.PointLight(_c.lightExt, 1.8, 12);
    g.add(luzExt);

    // Partículas de brillo orbital
    const N = 90, _pos = new Float32Array(N * 3);
    for (let i = 0; i < N; i++) {
        const th = Math.random() * Math.PI * 2, ph = Math.random() * Math.PI;
        const r  = 0.88 + Math.random() * 0.55;
        _pos[i*3]   = r * Math.sin(ph) * Math.cos(th);
        _pos[i*3+1] = r * Math.cos(ph);
        _pos[i*3+2] = r * Math.sin(ph) * Math.sin(th);
    }
    const geoP = new THREE.BufferGeometry();
    geoP.setAttribute('position', new THREE.BufferAttribute(_pos, 3));
    g.add(new THREE.Points(geoP, new THREE.PointsMaterial({
        color: _c.particle, size: 0.055, transparent: true, opacity: 0.85,
        blending: THREE.AdditiveBlending, depthWrite: false, fog: false,
    })));

    // Posición: visible ligeramente a la derecha del frente, a altura de ojos
    g.position.set(1.8, 1.5, -4.2);
    scene.add(g);
    _portalGrupo = g;

    console.log('[WorldWeaver] Portal invocado → ' + NEXT_SCENE_URL);
};

// ── Render loop ───────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// Vectores reutilizables para el movimiento FPS
const _fpsForward = new THREE.Vector3();
const _fpsRight   = new THREE.Vector3();

// ── Llegada por portal: estado de transición de entrada ──────────────────
const _llegadaPortal = new URLSearchParams(window.location.search).has('portal');
let _llegadaInicio   = null;
const _DURACION_LLEGADA = 900;

if (_llegadaPortal) {
    _llegadaInicio = performance.now();
    _reproducirSonidoLlegada();
}

let _lastAnimTime = performance.now() * 0.001;

function animate() {
    requestAnimationFrame(animate);

    const t     = performance.now() * 0.001;
    const delta = Math.min(t - _lastAnimTime, 0.1);  // cap 100ms para evitar saltos
    _lastAnimTime = t;

    if (window.PersonajesManager) PersonajesManager.update(delta);
    interacciones.update();
    cieloDinamico.update(t);
    escenaDinamica.update(t);

    // Portal: animación idle + absorción
    if (_portalGrupo) {
        if (!_portalActivado) {
            // Animación idle
            _portalGrupo.rotation.y  += 0.007;
            if (_portalAnillo1) _portalAnillo1.rotation.z += 0.020;
            if (_portalAnillo2) _portalAnillo2.rotation.z -= 0.013;
            _portalGrupo.position.y = 1.5 + 0.18 * Math.sin(t * 0.85);
            if (_portalLuz) _portalLuz.intensity = 3.5 + 1.3 * Math.sin(t * 2.1);

            const _dx   = camera.position.x - _portalGrupo.position.x;
            const _dz   = camera.position.z - _portalGrupo.position.z;
            const _dist = Math.sqrt(_dx * _dx + _dz * _dz);

            // Hint de proximidad
            if (_dist < 3.5) {
                _elPortalHint.style.display = 'block';
                _elPortalHint.style.opacity = Math.min(1, (3.5 - _dist) / 2.0).toFixed(2);
            } else {
                _elPortalHint.style.display = 'none';
            }

            // Colisión → arrancar absorción
            if (_dist < 1.1 && fpsModo) {
                _portalActivado       = true;
                _portalTransicionInicio = performance.now();
                _portalPosFinal       = _portalGrupo.position.clone();
                _elPortalHint.style.display = 'none';
                _reproducirSonidoPortal();
            }

        } else if (_portalTransicionInicio !== null) {
            // ── Animación de absorción frame-by-frame ──────────────────────
            const elapsed  = performance.now() - _portalTransicionInicio;
            const progress = Math.min(elapsed / 1100, 1.0);
            const easeFast = Math.pow(progress, 2.0);

            // Cámara se lanza hacia el portal
            const pull = 0.055 + easeFast * 0.18;
            camera.position.x += (_portalPosFinal.x - camera.position.x) * pull;
            camera.position.y += (_portalPosFinal.y - camera.position.y) * pull * 0.4;
            camera.position.z += (_portalPosFinal.z - camera.position.z) * pull;

            // FOV se expande: efecto vórtice
            camera.fov = 55 + 120 * easeFast;
            camera.updateProjectionMatrix();

            // Portal crece y gira cada vez más rápido para «engullir»
            _portalGrupo.scale.setScalar(1 + easeFast * 8);
            _portalGrupo.rotation.y  += 0.025 + easeFast * 0.25;
            if (_portalAnillo1) _portalAnillo1.rotation.z += 0.05 + easeFast * 0.35;
            if (_portalAnillo2) _portalAnillo2.rotation.z -= 0.04 + easeFast * 0.25;
            if (_portalLuz) _portalLuz.intensity = 5 + easeFast * 25;

            // Flash radial — aparece en la segunda mitad
            if (progress > 0.42) {
                const fp = Math.pow((progress - 0.42) / 0.58, 1.6);
                _elPortalFlash.style.opacity = Math.min(fp, 1).toFixed(3);
            }

            if (progress >= 1.0) {
                if (!NEXT_SCENE_URL) {
                    _portalTransicionInicio = null;
                    salirFPS();
                    if (FIN_DATA && typeof window._mostrarFinOverlay === 'function') {
                        setTimeout(function() { window._mostrarFinOverlay(); }, 200);
                    }
                } else {
                    window.location.href = NEXT_SCENE_URL + '?portal=1';
                }
            }
        }
    }

    // ── Transición de llegada (inversa del portal) ────────────────────────
    if (_llegadaInicio !== null) {
        const elapsed  = performance.now() - _llegadaInicio;
        const progress = Math.min(elapsed / _DURACION_LLEGADA, 1.0);
        // easeOut cúbico: rápido al principio, suave al final
        const easeOut  = 1 - Math.pow(1 - progress, 3);

        // FOV se contrae de 130° a 55° — sensación de materialización
        camera.fov = 130 - 75 * easeOut;
        camera.updateProjectionMatrix();

        // Flash se desvanece de 1 a 0
        _elPortalFlash.style.opacity = (1 - easeOut).toFixed(3);

        if (progress >= 1.0) {
            camera.fov = 55;
            camera.updateProjectionMatrix();
            _elPortalFlash.style.opacity = '0';
            _llegadaInicio = null;
        }
    }

    if (fpsModo) {
        // Flotación inmersiva (espacio/luna/agua): se pausa con diálogo/inspección abiertos.
        const _flotando = _AMBIENTE_FLOTANTE
            && !window._wwDialogoAbierto?.() && !window._wwInspeccionActiva?.();

        // Aplicar rotación (+ balanceo lateral mínimo bajo el agua)
        const _roll = (_AMBIENTE_AGUA && _flotando) ? 0.03 * Math.sin(t * 0.6) : 0;
        camera.rotation.set(fpsPitch, fpsYaw, _roll, 'YXZ');

        // Calcular vectores de dirección (ignorando componente Y para no volar)
        _fpsForward.set(-Math.sin(fpsYaw), 0, -Math.cos(fpsYaw));
        _fpsRight.set(Math.cos(fpsYaw), 0, -Math.sin(fpsYaw));

        if (document.pointerLockElement && !window._wwDialogoAbierto?.()) {
            if (fpsKeys['ArrowUp']    || fpsKeys['KeyW'])
                camera.position.addScaledVector(_fpsForward, FPS_VELOCIDAD);
            if (fpsKeys['ArrowDown']  || fpsKeys['KeyS'])
                camera.position.addScaledVector(_fpsForward, -FPS_VELOCIDAD);
            if (fpsKeys['ArrowLeft']  || fpsKeys['KeyA'])
                camera.position.addScaledVector(_fpsRight, -FPS_VELOCIDAD);
            if (fpsKeys['ArrowRight'] || fpsKeys['KeyD'])
                camera.position.addScaledVector(_fpsRight, FPS_VELOCIDAD);
        }

        // Altura: fija sobre suelo firme; bob suave (mayor al desplazarse) si flota.
        if (_flotando) {
            const _moviendo = fpsKeys['ArrowUp']||fpsKeys['KeyW']||fpsKeys['ArrowDown']||fpsKeys['KeyS']
                || fpsKeys['ArrowLeft']||fpsKeys['KeyA']||fpsKeys['ArrowRight']||fpsKeys['KeyD'];
            const _amp = (_AMBIENTE_AGUA ? 0.13 : 0.10) + (_moviendo ? 0.06 : 0);
            camera.position.y = FPS_ALTURA + _amp * Math.sin(t * 1.1);
        } else {
            camera.position.y = FPS_ALTURA;
        }

        // Límite de movimiento: leído directamente del SceneGraph (calculado por el Constructor
        // según el tipo de interior/exterior). Fallback para scenes generadas sin este campo.
        const _esInterior = (SCENE_GRAPH.tipo_escena === 'interior');
        const _radioEscena = SCENE_GRAPH.radio_escena ?? 22.0;
        const _esCaja = (SCENE_GRAPH.tipo_ambiente === 'interior' || SCENE_GRAPH.tipo_ambiente === 'interior_grande');
        if (_esCaja) {
            // Interiores en caja: la zona jugable es TODO el cuadrado, incluidas las
            // esquinas (clamp por caja en X y Z por separado, no por radio). Así se puede
            // alcanzar el mobiliario pegado a cualquier pared o esquina. Las paredes están
            // a ±radio; dejamos 1.0 de margen para no clipar dentro del muro.
            const _lim = _radioEscena - 1.0;
            camera.position.x = Math.max(-_lim, Math.min(_lim, camera.position.x));
            camera.position.z = Math.max(-_lim, Math.min(_lim, camera.position.z));
        } else {
            // Exterior y cueva: zona transitable circular (clamp por radio).
            const _limiteR = SCENE_GRAPH.limite_jugador ?? (_esInterior ? Math.min(_radioEscena * 0.55, 4.0) : 6.5);
            const _distXZ  = Math.sqrt(camera.position.x ** 2 + camera.position.z ** 2);
            if (_distXZ > _limiteR) {
                const _f = _limiteR / _distXZ;
                camera.position.x *= _f;
                camera.position.z *= _f;
            }
        }

        // Barco: altura + zona de movimiento según estado (cubierta vs agua), + hint B.
        if (_ES_BARCO) {
            const DH = window._BARCO_DECK_H ?? 1.0, DR = window._BARCO_DECK_R ?? 4.6;
            if (_transBarco) {
                // Animación de subir/bajar: interpola la altura de cámara.
                const p = Math.min(1, (performance.now() - _transBarco.t0) / _transBarco.dur);
                camera.position.y = _transBarco.fromY + (_transBarco.toY - _transBarco.fromY) * p;
                if (p >= 1) { _transBarco.despues && _transBarco.despues(); _transBarco = null; }
                _barcoHint(null);
            } else if (_enBarco) {
                camera.position.y = DH + FPS_ALTURA;
                const d = Math.sqrt(camera.position.x ** 2 + camera.position.z ** 2);
                const lim = DR * 0.82;
                if (d > lim) { const f = lim / d; camera.position.x *= f; camera.position.z *= f; }
                _barcoHint(d > lim * 0.82 ? 'B — bajar al agua' : null);
            } else {
                camera.position.y = FPS_ALTURA;
                const d = Math.sqrt(camera.position.x ** 2 + camera.position.z ** 2);
                const roam = Math.min(_radioEscena - 5, 14);  // se puede explorar más lejos por el agua
                if (d > roam) {
                    const f = roam / d; camera.position.x *= f; camera.position.z *= f;
                } else if (d < DR) {
                    // Barrera física: no atravesar el casco del barco (deslizar por fuera).
                    const f = DR / Math.max(d, 0.01); camera.position.x *= f; camera.position.z *= f;
                }
                _barcoHint(d < DR + 1.6 ? 'B — subir al barco' : null);
            }
        }

        // Chapoteos al caminar sobre el agua (sobre_agua, o barco tras desembarcar).
        // Cadencia por DISTANCIA recorrida (independiente del framerate).
        const _pisandoAgua = _SOBRE_AGUA || (typeof _enModoAgua !== 'undefined' && _enModoAgua);
        if (_pisandoAgua && document.pointerLockElement) {
            if (_prevPX !== null) {
                _pasoDist += Math.hypot(camera.position.x - _prevPX, camera.position.z - _prevPZ);
                if (_pasoDist > 1.4) { _pasoDist = 0; window._wwChapoteo?.(); }
            }
            _prevPX = camera.position.x; _prevPZ = camera.position.z;
        }
    } else {
        controls.update();
    }

    renderer.render(scene, camera);
}

// ── Barco: hint en pantalla + transiciones de subir/bajar (tecla B contextual) ──
let _barcoHintEl = null, _barcoHintTxt = '';
if (_ES_BARCO) {
    _barcoHintEl = document.createElement('div');
    _barcoHintEl.style.cssText = 'position:fixed;left:50%;bottom:130px;transform:translateX(-50%);'
        + 'padding:8px 18px;background:rgba(10,22,42,0.72);color:#cfe6ff;border:1px solid #3a5a80;'
        + 'border-radius:18px;font:600 14px system-ui,sans-serif;pointer-events:none;opacity:0;'
        + 'transition:opacity .2s;z-index:60;white-space:nowrap;';
    document.body.appendChild(_barcoHintEl);
}
function _barcoHint(txt) {
    if (!_barcoHintEl) return;
    if (txt) {
        if (txt !== _barcoHintTxt) { _barcoHintEl.textContent = txt; _barcoHintTxt = txt; }
        _barcoHintEl.style.opacity = '1';
    } else if (_barcoHintTxt) { _barcoHintEl.style.opacity = '0'; _barcoHintTxt = ''; }
}
function _iniciarTransBarco(toY, despues) {
    _transBarco = { t0: performance.now(), dur: 600, fromY: camera.position.y, toY: toY, despues: despues };
}
function _desembarcar() {
    const DR = window._BARCO_DECK_R ?? 4.6;
    camera.position.x = -Math.sin(fpsYaw) * (DR + 1.3);  // al agua, justo delante
    camera.position.z = -Math.cos(fpsYaw) * (DR + 1.3);
    _iniciarTransBarco(FPS_ALTURA, () => { _enBarco = false; _enModoAgua = true; });
}
function _subirBarco() {
    camera.position.x = 0; camera.position.z = 0;  // al centro de la cubierta
    _iniciarTransBarco((window._BARCO_DECK_H ?? 1.0) + FPS_ALTURA, () => { _enBarco = true; _enModoAgua = false; });
}
if (_ES_BARCO) {
    window.addEventListener('keydown', (e) => {
        if (!fpsModo || _transBarco || window._wwDialogoAbierto?.()) return;
        if (e.code !== 'KeyB') return;
        const DR = window._BARCO_DECK_R ?? 4.6;
        const d = Math.sqrt(camera.position.x ** 2 + camera.position.z ** 2);
        if (_enBarco && d > DR * 0.6) _desembarcar();
        else if (!_enBarco && d < DR + 1.6) _subirBarco();
    });
}

animate();
// Entrar en FPS en el primer gesto del usuario (click o tecla).
// requestPointerLock() exige un gesto — no se puede capturar el ratón automáticamente.
// También lo usa la intro para entrar en FPS justo al cerrarse.
window._wwEntrarFPS = function () { if (!fpsModo) entrarFPS(); };

const _entrarFpsAlPrimerGesto = () => {
    if (!fpsModo && !window._introActiva) entrarFPS();
};
renderer.domElement.addEventListener('click',   _entrarFpsAlPrimerGesto, { once: true });
document.addEventListener(            'keydown', _entrarFpsAlPrimerGesto, { once: true });
</script>

</body>
