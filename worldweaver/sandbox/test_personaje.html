<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>WorldWeaver — Visor de Personajes</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f0f1a;
      color: #e0e0f0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      height: 100vh;
      display: flex;
      overflow: hidden;
    }

    /* ── Panel lateral izquierdo ── */
    #panel {
      width: 220px;
      flex-shrink: 0;
      background: #141428;
      border-right: 1px solid #2a2a4a;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #panel-header {
      padding: 14px 16px 10px;
      border-bottom: 1px solid #2a2a4a;
      flex-shrink: 0;
    }
    #panel-header h1 {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #88aaff;
    }
    #panel-header p {
      font-size: 11px;
      color: #666;
      margin-top: 3px;
    }

    /* ── Lista de personajes ── */
    #section-chars {
      flex: 1;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    #section-chars h2 {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #556;
      padding: 10px 16px 6px;
      flex-shrink: 0;
    }
    #char-list {
      flex: 1;
      overflow-y: auto;
      padding: 0 8px 8px;
    }
    #char-list::-webkit-scrollbar { width: 4px; }
    #char-list::-webkit-scrollbar-track { background: transparent; }
    #char-list::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

    .char-item {
      padding: 7px 10px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      color: #aac;
      transition: background 0.15s, color 0.15s;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .char-item:hover { background: #1e1e3a; color: #cce; }
    .char-item.active {
      background: #1e2a5e;
      color: #88aaff;
      font-weight: 600;
    }
    .char-item .char-tag {
      font-size: 9px;
      padding: 1px 5px;
      border-radius: 3px;
      margin-left: 4px;
      background: #2a2a4a;
      color: #556;
      font-weight: 400;
    }
    .char-item.active .char-tag { background: #2a3a6e; color: #88aaff; }

    /* ── Selector de piel y variantes ── */
    #section-skin, #section-variants {
      flex-shrink: 0;
      border-top: 1px solid #2a2a4a;
      padding: 10px 8px 12px;
    }
    #section-skin h2, #section-variants h2 {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #556;
      padding: 0 8px 8px;
    }
    #skin-presets, #variant-presets {
      display: flex;
      gap: 5px;
      padding: 0 8px;
      align-items: center;
    }
    .skin-swatch, .variant-btn {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
      transition: border-color 0.15s, transform 0.1s;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .skin-swatch:hover, .variant-btn:hover { transform: scale(1.15); }
    .skin-swatch.active  { border-color: #88aaff; box-shadow: 0 0 0 1px #88aaff44; }
    .variant-btn {
      background: #1e1e3a;
      border-color: #2a2a4a;
      color: #667;
      font-size: 11px;
      font-weight: 700;
    }
    .variant-btn.active  { border-color: #88aaff; color: #88aaff; background: #1e2a5e; }
    .variant-btn.none-btn { font-size: 14px; color: #445; }
    .variant-shuffle {
      background: #1e1e3a;
      border: 2px solid #2a2a4a;
      border-radius: 50%;
      width: 26px;
      height: 26px;
      cursor: pointer;
      color: #667;
      font-size: 13px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.15s, color 0.15s, transform 0.1s;
      flex-shrink: 0;
    }
    .variant-shuffle:hover { border-color: #3a3a6a; color: #aac; transform: scale(1.1); }
    #skin-custom {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px dashed #3a3a5a;
      background: transparent;
      padding: 0;
      overflow: hidden;
      flex-shrink: 0;
    }
    #skin-custom::-webkit-color-swatch-wrapper { padding: 0; }
    #skin-custom::-webkit-color-swatch { border: none; border-radius: 50%; }

    /* ── Color de pelo ── */
    #section-hair {
      flex-shrink: 0;
      border-top: 1px solid #2a2a4a;
      padding: 10px 8px 12px;
    }
    #section-hair h2 {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #556;
      padding: 0 8px 8px;
    }
    #hair-presets {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      padding: 0 8px;
    }
    .hair-swatch {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
      transition: border-color 0.15s, transform 0.1s;
      flex-shrink: 0;
    }
    .hair-swatch:hover  { transform: scale(1.15); }
    .hair-swatch.active { border-color: #88aaff; box-shadow: 0 0 0 1px #88aaff44; }

    /* ── Panel de animaciones ── */
    #section-anims {
      flex-shrink: 0;
      border-top: 1px solid #2a2a4a;
      padding: 10px 8px 12px;
    }
    #section-anims h2 {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #556;
      padding: 0 8px 8px;
    }
    #anim-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px;
    }
    .anim-btn {
      padding: 6px 8px;
      border-radius: 5px;
      border: 1px solid #2a2a4a;
      background: #141428;
      color: #889;
      font-size: 11px;
      cursor: pointer;
      text-align: center;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .anim-btn:hover { background: #1e1e3a; color: #aac; border-color: #3a3a6a; }
    .anim-btn.playing {
      background: #1e2a5e;
      color: #88aaff;
      border-color: #4460bb;
      font-weight: 600;
    }

    /* ── Viewport ── */
    #viewport {
      flex: 1;
      position: relative;
      overflow: hidden;
    }
    #viewport canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
    }

    /* ── Info overlay ── */
    #info-overlay {
      position: absolute;
      top: 14px;
      left: 14px;
      pointer-events: none;
    }
    #char-name {
      font-size: 18px;
      font-weight: 700;
      color: #fff;
      text-shadow: 0 0 20px rgba(100,140,255,0.6);
    }
    #anim-name {
      font-size: 12px;
      color: #88aaff;
      margin-top: 4px;
    }
    #hint-overlay {
      position: absolute;
      bottom: 14px;
      left: 50%;
      transform: translateX(-50%);
      pointer-events: none;
      display: flex;
      gap: 16px;
    }
    .hint-pill {
      background: rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 5px 12px;
      font-size: 11px;
      color: #888;
    }
    .hint-pill b { color: #aac; }

    /* ── Loading indicator ── */
    #loader {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px;
      background: rgba(15,15,26,0.8);
      z-index: 10;
      transition: opacity 0.3s;
    }
    #loader.hidden { opacity: 0; pointer-events: none; }
    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid #2a2a4a;
      border-top-color: #88aaff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loader-text { font-size: 12px; color: #666; }

    /* ── Stats bar ── */
    #stats-bar {
      position: absolute;
      top: 14px;
      right: 14px;
      background: rgba(0,0,0,0.55);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 11px;
      color: #888;
      line-height: 1.7;
      pointer-events: none;
    }
    #stats-bar span { color: #aac; }
  </style>
</head>

<!-- Panel lateral -->
<div id="panel">

    <h1>Personajes</h1>

  </div>

</div>

// ── OrbitControls inline (r128) ───────────────────────────────────────────
THREE.OrbitControls = function(camera, domElement) {
  this.camera = camera;
  this.domElement = domElement;
  this.target = new THREE.Vector3(0, 1.0, 0);
  this.enabled = true;
  var scope = this;
  var STATE = { NONE: -1, ROTATE: 0, DOLLY: 1, PAN: 2 };
  var state = STATE.NONE;
  var spherical = new THREE.Spherical();
  var sphericalDelta = new THREE.Spherical();
  var scale = 1;
  var rotateStart = new THREE.Vector2(), rotateEnd = new THREE.Vector2(), rotateDelta = new THREE.Vector2();
  var panStart  = new THREE.Vector2(), panEnd = new THREE.Vector2(), panDelta = new THREE.Vector2();
  var offset = new THREE.Vector3();
  var quat = new THREE.Quaternion().setFromUnitVectors(camera.up, new THREE.Vector3(0,1,0));
  var quatInverse = quat.clone().invert();

  offset.copy(camera.position).sub(scope.target);
  offset.applyQuaternion(quat);
  spherical.setFromVector3(offset);

  var _panLeft = function(distance) {
    var v = new THREE.Vector3();
    v.setFromMatrixColumn(camera.matrix, 0);
    v.multiplyScalar(-distance);
    scope.target.add(v);
    camera.position.add(v);
  };
  var _panUp = function(distance) {
    var v = new THREE.Vector3();
    v.setFromMatrixColumn(camera.matrix, 1);
    v.multiplyScalar(distance);
    scope.target.add(v);
    camera.position.add(v);
  };

  this.update = function() {
    spherical.theta += sphericalDelta.theta;
    spherical.phi += sphericalDelta.phi;
    spherical.phi = Math.max(0.05, Math.min(Math.PI - 0.05, spherical.phi));
    spherical.radius *= scale;
    spherical.radius = Math.max(1.0, Math.min(12, spherical.radius));
    sphericalDelta.set(0,0,0); scale = 1;
    offset.setFromSpherical(spherical);
    offset.applyQuaternion(quatInverse);
    camera.position.copy(scope.target).add(offset);
    camera.lookAt(scope.target);
  };

  var onMouseDown = function(e) {
    if (!scope.enabled) return;
    if (e.button === 0) { state = STATE.ROTATE; rotateStart.set(e.clientX, e.clientY); }
    if (e.button === 2) { state = STATE.PAN;    panStart.set(e.clientX, e.clientY); }
  };
  var onMouseMove = function(e) {
    if (!scope.enabled || state === STATE.NONE) return;
    if (state === STATE.ROTATE) {
      rotateEnd.set(e.clientX, e.clientY);
      rotateDelta.subVectors(rotateEnd, rotateStart).multiplyScalar(0.005);
      sphericalDelta.theta -= rotateDelta.x;
      sphericalDelta.phi -= rotateDelta.y;
      rotateStart.copy(rotateEnd);
    } else if (state === STATE.PAN) {
      panEnd.set(e.clientX, e.clientY);
      panDelta.subVectors(panEnd, panStart).multiplyScalar(0.008);
      _panLeft(panDelta.x);
      _panUp(-panDelta.y);
      panStart.copy(panEnd);
    }
  };
  var onMouseUp = function() { state = STATE.NONE; };
  var onWheel = function(e) { e.preventDefault(); scale *= e.deltaY > 0 ? 1.12 : 0.88; };
  var onContextMenu = function(e) { e.preventDefault(); };

  domElement.addEventListener('mousedown', onMouseDown);
  domElement.addEventListener('mousemove', onMouseMove);
  domElement.addEventListener('mouseup', onMouseUp);
  domElement.addEventListener('wheel', onWheel, { passive: false });
  domElement.addEventListener('contextmenu', onContextMenu);

  this.dispose = function() {
    domElement.removeEventListener('mousedown', onMouseDown);
    domElement.removeEventListener('mousemove', onMouseMove);
    domElement.removeEventListener('mouseup', onMouseUp);
    domElement.removeEventListener('wheel', onWheel);
    domElement.removeEventListener('contextmenu', onContextMenu);
  };
};

// ── Escena Three.js ───────────────────────────────────────────────────────
const viewport = document.getElementById('viewport');

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
// Sin outputEncoding ni toneMapping: los colores GLTF vienen en linear y los
// convertimos manualmente al cargar cada modelo, así se muestran correctamente.
viewport.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0c0c1a);
scene.fog = new THREE.Fog(0x0c0c1a, 8, 22);

const camera = new THREE.PerspectiveCamera(45, 1, 0.01, 100);
camera.position.set(0, 1.6, 3.5);

const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.target.set(0, 1.0, 0);
controls.update();

// ── Iluminación ───────────────────────────────────────────────────────────
const ambientLight = new THREE.AmbientLight(0x8090c0, 0.6);
scene.add(ambientLight);

const keyLight = new THREE.DirectionalLight(0xfff5e0, 1.8);
keyLight.position.set(3, 5, 3);
keyLight.castShadow = true;
keyLight.shadow.mapSize.set(1024, 1024);
keyLight.shadow.camera.near = 0.5;
keyLight.shadow.camera.far = 20;
keyLight.shadow.camera.left = -3;
keyLight.shadow.camera.right = 3;
keyLight.shadow.camera.top = 4;
keyLight.shadow.camera.bottom = -0.5;
scene.add(keyLight);

const fillLight = new THREE.DirectionalLight(0x6090ff, 0.5);
fillLight.position.set(-3, 3, -2);
scene.add(fillLight);

const rimLight = new THREE.DirectionalLight(0xffffff, 0.3);
rimLight.position.set(0, 2, -4);
scene.add(rimLight);

// ── Suelo de referencia ───────────────────────────────────────────────────
const gridHelper = new THREE.GridHelper(8, 16, 0x2a2a5a, 0x1a1a3a);
scene.add(gridHelper);

const groundGeo = new THREE.CircleGeometry(4, 32);
const groundMat = new THREE.MeshStandardMaterial({
  color: 0x12122a,
  roughness: 0.9,
  metalness: 0.1,
});
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

  { id: 'rubio',          label: 'Rubio',          swatch: '#E8C96A', hue: 0.12, sat: [0.55, 0.85], light: [0.58, 0.78] },
  { id: 'pelirrojo',      label: 'Pelirrojo',      swatch: '#B34A20', hue: 0.04, sat: [0.75, 0.95], light: [0.35, 0.50] },
  { id: 'gris',           label: 'Gris / Canoso',  swatch: '#888888', hue: 0.60, sat: [0.00, 0.08], light: [0.45, 0.65] },
  { id: 'blanco',         label: 'Blanco',         swatch: '#F0EEEC', hue: 0.10, sat: [0.00, 0.05], light: [0.82, 0.95] },
  { id: 'rojo',           label: 'Rojo (fantasy)',  swatch: '#CC2200', hue: 0.00, sat: [0.80, 1.00], light: [0.35, 0.52] },
  { id: 'azul',           label: 'Azul (fantasy)',  swatch: '#3344BB', hue: 0.62, sat: [0.75, 1.00], light: [0.35, 0.58] },
  { id: 'verde',          label: 'Verde (fantasy)', swatch: '#2A7A40', hue: 0.35, sat: [0.60, 0.90], light: [0.28, 0.50] },
];

let activeSkinHex    = SKIN_PRESETS[1].hex;
let activeHairId     = 'castano_oscuro';
let activeVariantSeed = 0;

// Solo Skin y Face quedan fuera de la variación de ropa
const MATS_EXCLUIDOS = new Set(['Skin', 'Face', 'Hair']);

// Colores originales (en sRGB, post-conversión) indexados por material.uuid
let originalColors = {};

function hexToSRGB(hex) {
  const r = parseInt(hex.slice(1,3), 16) / 255;
  const g = parseInt(hex.slice(3,5), 16) / 255;
  const b = parseInt(hex.slice(5,7), 16) / 255;
  return new THREE.Color(r, g, b);
}

function seededRandom(seed) {
  let s = seed >>> 0;
  return function() {
    s = (s + 0x6D2B79F5) | 0;
    let t = Math.imul(s ^ (s >>> 15), 1 | s);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

function hashStr(str) {
  let h = 0x811c9dc5;
  for (let i = 0; i < str.length; i++) {
    h ^= str.charCodeAt(i);
    h = (Math.imul(h, 0x01000193)) >>> 0;
  }
  return h;
}

// Genera un THREE.Color dentro del rango HSL del preset de pelo, usando el seed
// para que dos personajes con el mismo nombre de color no sean idénticos
function colorDesdePeloPreset(hairId, seed) {
  const preset = HAIR_PRESETS.find(function(p) { return p.id === hairId; });
  if (!preset) return null;
  const rng = seededRandom(seed + 999);
  const hueJitter = (rng() - 0.5) * 0.025;
  const sat   = preset.sat[0]   + rng() * (preset.sat[1]   - preset.sat[0]);
  const light = preset.light[0] + rng() * (preset.light[1] - preset.light[0]);
  return new THREE.Color().setHSL((preset.hue + hueJitter + 1) % 1, sat, light);
}

function aplicarApariencia(skinHex, hairId, variantSeed) {
  if (!currentModel) return;
  activeSkinHex     = skinHex;
  activeHairId      = hairId;
  activeVariantSeed = variantSeed;

  document.querySelectorAll('.skin-swatch').forEach(function(s) {
    s.classList.toggle('active', s.dataset.hex === skinHex);
  });
  const picker = document.getElementById('skin-custom');
  if (picker) picker.value = skinHex;

  document.querySelectorAll('.hair-swatch').forEach(function(s) {
    s.classList.toggle('active', s.dataset.id === hairId);
  });

  document.querySelectorAll('.variant-btn').forEach(function(b) {
    b.classList.toggle('active', parseInt(b.dataset.seed) === variantSeed);
  });

  const skinColor = hexToSRGB(skinHex);
  // Color de pelo: seed derivado del variantSeed para que cambie con la variante
  const hairColor = colorDesdePeloPreset(hairId, variantSeed * 13 + 1);
  const processed = new Set();

  currentModel.traverse(function(node) {
    if (!node.isMesh) return;
    const mats = Array.isArray(node.material) ? node.material : [node.material];
    mats.forEach(function(mat) {
      if (!mat || processed.has(mat.uuid)) return;
      processed.add(mat.uuid);

      if (mat.name === 'Skin') {
        mat.color.set(skinColor);

      } else if (mat.name === 'Hair') {
        if (hairColor) mat.color.set(hairColor);

      } else if (!MATS_EXCLUIDOS.has(mat.name)) {
        // Ropa y accesorios: variación de ropa basada en seed
        const orig = originalColors[mat.uuid];
        if (!orig) return;
        if (variantSeed === 0) {
          mat.color.set(orig);
        } else {
          const matSeed = (variantSeed * 7919 + hashStr(mat.name)) >>> 0;
          const rng = seededRandom(matSeed);
          const hsl = { h: 0, s: 0, l: 0 };
          orig.clone().getHSL(hsl);
          const hueShift  = (rng() - 0.5) * 0.45;
          const satMult   = 0.5  + rng() * 1.1;
          const lightMult = 0.70 + rng() * 0.60;
          mat.color.setHSL(
            (hsl.h + hueShift + 1) % 1,
            Math.min(1,    hsl.s * satMult),
            Math.min(0.92, Math.max(0.04, hsl.l * lightMult))
          );
        }
      }
      mat.needsUpdate = true;
    });
  });
}

// ── UI: piel ──────────────────────────────────────────────────────────────
(function() {
  const container = document.getElementById('skin-presets');
  SKIN_PRESETS.forEach(function(preset) {
    const sw = document.createElement('div');
    sw.className = 'skin-swatch' + (preset.hex === activeSkinHex ? ' active' : '');
    sw.style.background = preset.hex;
    sw.dataset.hex = preset.hex;
    sw.title = preset.label;
    sw.addEventListener('click', function() {
      aplicarApariencia(preset.hex, activeHairId, activeVariantSeed);
    });
    container.appendChild(sw);
  });
  const picker = document.createElement('input');
  picker.type = 'color';
  picker.id = 'skin-custom';
  picker.value = activeSkinHex;
  picker.title = 'Color personalizado';
  picker.addEventListener('input', function() {
    aplicarApariencia(picker.value, activeHairId, activeVariantSeed);
  });
  container.appendChild(picker);
})();

// ── UI: pelo ──────────────────────────────────────────────────────────────
(function() {
  const container = document.getElementById('hair-presets');
  HAIR_PRESETS.forEach(function(preset) {
    const sw = document.createElement('div');
    sw.className = 'hair-swatch' + (preset.id === activeHairId ? ' active' : '');
    sw.style.background = preset.swatch;
    sw.dataset.id = preset.id;
    sw.title = preset.label;
    sw.addEventListener('click', function() {
      aplicarApariencia(activeSkinHex, preset.id, activeVariantSeed);
    });
    container.appendChild(sw);
  });
})();

// ── UI: variantes de ropa ─────────────────────────────────────────────────
(function() {
  const container = document.getElementById('variant-presets');

  const noneBtn = document.createElement('div');
  noneBtn.className = 'variant-btn none-btn active';
  noneBtn.dataset.seed = '0';
  noneBtn.title = 'Sin variación';
  noneBtn.textContent = '—';
  noneBtn.addEventListener('click', function() {
    aplicarApariencia(activeSkinHex, activeHairId, 0);
  });
  container.appendChild(noneBtn);

  for (let i = 1; i <= 5; i++) {
    const btn = document.createElement('div');
    btn.className = 'variant-btn';
    btn.dataset.seed = String(i);
    btn.title = 'Variante ' + i;
    btn.textContent = String(i);
    btn.addEventListener('click', function() {
      aplicarApariencia(activeSkinHex, activeHairId, i);
    });
    container.appendChild(btn);
  }

  const shuffle = document.createElement('div');
  shuffle.className = 'variant-shuffle';
  shuffle.title = 'Variante aleatoria';
  shuffle.textContent = '⟳';
  shuffle.addEventListener('click', function() {
    const seed = Math.floor(Math.random() * 9990) + 10;
    aplicarApariencia(activeSkinHex, activeHairId, seed);
    document.querySelectorAll('.variant-btn').forEach(function(b) { b.classList.remove('active'); });
  });
  container.appendChild(shuffle);
})();

// ── Estado de animación ───────────────────────────────────────────────────
let currentModel = null;
let mixer = null;
let currentAction = null;
let currentAnimName = '';
let clock = new THREE.Clock();

// FPS counter
let frameCount = 0;
let fpsTime = 0;

// ── Carga de personaje ────────────────────────────────────────────────────
const loader = new THREE.GLTFLoader();

function cargarPersonaje(charId) {
  const loaderEl = document.getElementById('loader');
  const loaderText = document.getElementById('loader-text');
  loaderEl.classList.remove('hidden');
  loaderText.textContent = `Cargando ${charId}...`;

  // Limpiar modelo anterior
  if (currentModel) {
    scene.remove(currentModel);
    currentModel = null;
  }
  if (mixer) {
    mixer.stopAllAction();
    mixer = null;
    currentAction = null;
  }

  document.getElementById('anim-grid').innerHTML = '';
  document.getElementById('char-name').textContent = charId.replace(/_/g, ' ');
  document.getElementById('anim-name').textContent = 'Cargando...';
  document.getElementById('stat-anims').textContent = '—';

  const url = `assets/characters/${charId}.gltf`;

  loader.load(
    url,
    function(gltf) {
      currentModel = gltf.scene;

      // Sombras + guardar colores originales (linear → sRGB)
      originalColors = {};
      const seenMats = new Set();
      currentModel.traverse(function(node) {
        if (!node.isMesh) return;
        node.castShadow = true;
        node.receiveShadow = false;
        const mats = Array.isArray(node.material) ? node.material : [node.material];
        mats.forEach(function(mat) {
          if (!mat || seenMats.has(mat.uuid)) return;
          seenMats.add(mat.uuid);
          if (mat.color) {
            mat.color.convertLinearToSRGB();
            originalColors[mat.uuid] = mat.color.clone(); // guardar post-conversión
          }
        });
      });

      // Centrar y escalar el personaje
      const box = new THREE.Box3().setFromObject(currentModel);
      const size = box.getSize(new THREE.Vector3());
      const center = box.getCenter(new THREE.Vector3());
      currentModel.position.sub(center);
      currentModel.position.y += size.y / 2;

      scene.add(currentModel);

      // Mostrar/ocultar panel de pelo según si el modelo tiene material Hair
      let hayHair = false;
      currentModel.traverse(function(n) {
        if (!n.isMesh) return;
        const mm = Array.isArray(n.material) ? n.material : [n.material];
        mm.forEach(function(m) { if (m && m.name === 'Hair') hayHair = true; });
      });
      document.getElementById('section-hair').style.display = hayHair ? '' : 'none';

      // Aplicar piel + pelo + variante activos
      aplicarApariencia(activeSkinHex, activeHairId, activeVariantSeed);

      // Setup animaciones
      mixer = new THREE.AnimationMixer(currentModel);

      const clips = gltf.animations;
      document.getElementById('stat-anims').textContent = clips.length;

      // Botones de animaciones
      construirBotonesAnimacion(clips);

      // Arrancar Idle por defecto
      const idleClip = THREE.AnimationClip.findByName(clips, 'Idle')
                    || clips[0];
      if (idleClip) {
        reproducirAnimacion(idleClip.name, clips);
      }

      loaderEl.classList.add('hidden');
    },
    function(xhr) {
      const pct = xhr.total > 0 ? Math.round(xhr.loaded / xhr.total * 100) : '...';
      loaderText.textContent = `Cargando ${charId}... ${pct}%`;
    },
    function(err) {
      console.error('Error cargando', charId, err);
      loaderText.textContent = `Error: no se pudo cargar ${charId}`;
    }
  );
}

function construirBotonesAnimacion(clips) {
  const grid = document.getElementById('anim-grid');
  grid.innerHTML = '';

  // Orden de importancia para el catálogo WorldWeaver
  const PRIORIDAD = ['Idle', 'Walk', 'Run', 'Victory', 'SitDown', 'StandUp',
                     'Jump', 'Punch', 'SwordSlash', 'PickUp', 'Roll',
                     'Shoot_OneHanded', 'RecieveHit', 'Defeat', 'Death',
                     'Run_Carry', 'Walk_Carry'];

  const sorted = [...clips].sort((a, b) => {
    const ia = PRIORIDAD.indexOf(a.name);
    const ib = PRIORIDAD.indexOf(b.name);
    if (ia === -1 && ib === -1) return a.name.localeCompare(b.name);
    if (ia === -1) return 1;
    if (ib === -1) return -1;
    return ia - ib;
  });

  sorted.forEach(function(clip) {
    const btn = document.createElement('button');
    btn.className = 'anim-btn';
    btn.textContent = clip.name;
    btn.dataset.anim = clip.name;
    btn.title = `${clip.name} — ${clip.duration.toFixed(2)}s`;
    btn.addEventListener('click', function() {
      reproducirAnimacion(clip.name, clips);
    });
    grid.appendChild(btn);
  });
}

function reproducirAnimacion(nombre, clips) {
  if (!mixer) return;

  const clip = THREE.AnimationClip.findByName(clips, nombre);
  if (!clip) return;

  const newAction = mixer.clipAction(clip);

  if (currentAction && currentAction !== newAction) {
    currentAction.crossFadeTo(newAction, 0.25, false);
  }
  newAction.reset().play();
  currentAction = newAction;
  currentAnimName = nombre;

  document.getElementById('anim-name').textContent = nombre;
  document.querySelectorAll('.anim-btn').forEach(function(btn) {
    btn.classList.toggle('playing', btn.dataset.anim === nombre);
  });
}

// ── UI: lista de personajes ───────────────────────────────────────────────
const charList = document.getElementById('char-list');

CHARACTERS.forEach(function(char, idx) {
  const item = document.createElement('div');
  item.className = 'char-item';
  item.dataset.id = char.id;
  item.innerHTML = `${char.label}<span class="char-tag">${char.tag}</span>`;
  item.addEventListener('click', function() {
    document.querySelectorAll('.char-item').forEach(el => el.classList.remove('active'));
    item.classList.add('active');
    cargarPersonaje(char.id);
  });
  charList.appendChild(item);
});

// Cargar el primero por defecto (Wizard — más reconocible)
(function() {
  const wizardIdx = CHARACTERS.findIndex(c => c.id === 'Wizard');
  const target = wizardIdx >= 0 ? wizardIdx : 0;
  const items = charList.querySelectorAll('.char-item');
  items[target].classList.add('active');
  items[target].scrollIntoView({ block: 'nearest' });
  cargarPersonaje(CHARACTERS[target].id);
})();

// ── Resize ────────────────────────────────────────────────────────────────
function onResize() {
  const w = viewport.clientWidth;
  const h = viewport.clientHeight;
  renderer.setSize(w, h);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
window.addEventListener('resize', onResize);
onResize();

// ── Loop de render ────────────────────────────────────────────────────────
function animate() {
  requestAnimationFrame(animate);

  const delta = clock.getDelta();

  if (mixer) mixer.update(delta);
  controls.update();
  renderer.render(scene, camera);

  // FPS
  frameCount++;
  fpsTime += delta;
  if (fpsTime >= 0.5) {
    document.getElementById('stat-fps').textContent = Math.round(frameCount / fpsTime);
    frameCount = 0;
    fpsTime = 0;
  }
}

animate();

</script>
