<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>WorldWeaver — Tutorial</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0d0d1a; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; }

        #ui {
            position: absolute; top: 0; left: 0; width: 100%; padding: 12px 16px;
            display: flex; justify-content: space-between; align-items: flex-start;
            pointer-events: none;
        }
        #titulo {
            color: #fff; font-size: 15px; font-weight: 600;
            background: rgba(0,0,0,0.55); padding: 6px 12px; border-radius: 8px;
        }
        #titulo span { color: #ffcc44; }

        #hint {
            position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%);
            color: rgba(255,255,255,0.4); font-size: 12px;
            background: rgba(0,0,0,0.4); padding: 4px 10px; border-radius: 20px;
            transition: color 0.3s;
        }

        #pause-bar {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            display: flex; align-items: center; gap: 18px;
            pointer-events: none;
        }
        #home-btn {
            pointer-events: auto; cursor: pointer;
            width: 46px; height: 46px; border-radius: 13px;
            background: rgba(0,0,0,0.45); border: 1px solid rgba(255,255,255,0.10);
            color: #fff; font-size: 21px; line-height: 1;
            display: flex; align-items: center; justify-content: center;
            transition: all .18s;
        }
        #home-btn:hover {
            background: rgba(180,60,60,0.55); border-color: rgba(255,120,120,0.4);
            transform: scale(1.07);
        }

        #exit-confirm {
            display: none; position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(15,12,24,0.97); border: 1px solid rgba(255,255,255,0.12);
            border-radius: 16px; padding: 26px 32px; text-align: center;
            pointer-events: auto; z-index: 10;
            box-shadow: 0 20px 60px rgba(0,0,0,0.6);
        }
        #exit-confirm p { color: #fff; font-size: 16px; font-weight: 600; margin: 0 0 18px; }
        #exit-confirm .ec-btns { display: flex; gap: 12px; justify-content: center; }
        #exit-confirm button {
            cursor: pointer; min-width: 78px; padding: 9px 0; border-radius: 9px;
            font-size: 14px; font-weight: 600; border: 1px solid transparent; transition: all .15s;
        }
        #ec-yes { background: rgba(180,60,60,0.85); color: #fff; }
        #ec-yes:hover { background: rgba(214,72,72,1); }
        #ec-no  { background: rgba(255,255,255,0.12); color: #ddd; border-color: rgba(255,255,255,0.15); }
        #ec-no:hover  { background: rgba(255,255,255,0.2); color: #fff; }

        #btn-modo {
            pointer-events: auto; cursor: pointer;
            background: rgba(80,60,160,0.75); border: 1px solid rgba(140,110,255,0.4);
            color: #ccc; font-size: 12px; padding: 5px 11px; border-radius: 8px;
            transition: background 0.2s;
        }
        #btn-modo:hover { background: rgba(100,80,200,0.9); color: #fff; }
        #btn-modo.fps-activo { background: rgba(40,120,60,0.85); border-color: rgba(80,220,100,0.5); color: #aeffb8; }

        #crosshair {
            display: none; position: absolute;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 18px; height: 18px; pointer-events: none;
        }
        #crosshair::before, #crosshair::after {
            content: ''; position: absolute; background: rgba(255,255,255,0.75);
            border-radius: 1px;
        }
        #crosshair::before { width: 2px; height: 100%; left: 50%; transform: translateX(-50%); }
        #crosshair::after  { width: 100%; height: 2px; top: 50%; transform: translateY(-50%); }

        #fps-overlay {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.55); pointer-events: auto; cursor: crosshair;
            justify-content: center; align-items: center; flex-direction: column; gap: 8px;
        }
        #fps-overlay p { color: #fff; font-size: 16px; font-weight: 600; }
        #fps-overlay small { color: #aaa; font-size: 12px; }

        #tooltip {
            position: absolute; display: none;
            background: rgba(10,10,30,0.92); color: #eee;
            border: 1px solid rgba(255,255,255,0.15); border-radius: 8px;
            padding: 8px 12px; font-size: 12px; max-width: 220px;
            pointer-events: none; line-height: 1.6;
        }
        #tooltip .tt-nombre { font-weight: 700; font-size: 13px; color: #88aaff; }
        #tooltip .tt-tipo { color: #aaa; text-transform: uppercase; font-size: 10px; letter-spacing: 1px; }

        #portal-flash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(ellipse at center, #ffffff 0%, #99bbff 50%, #1a22cc 100%);
            opacity: 1; pointer-events: none; z-index: 9999;
        }
        #portal-hint {
            display: none; position: absolute; bottom: 48px; left: 50%;
            transform: translateX(-50%);
            color: rgba(160,200,255,0.9); font-size: 13px; font-style: italic;
            letter-spacing: 1.5px; text-align: center;
            text-shadow: 0 0 16px rgba(80,140,255,1), 0 0 32px rgba(100,80,255,0.6);
            pointer-events: none;
        }

        /* ── Tutorial HUD ─────────────────────────────────────────────────────── */
        #tut-hud {
            position: absolute; bottom: 52px; left: 50%; transform: translateX(-50%);
            background: rgba(10,8,20,0.75); border: 1px solid rgba(255,200,80,0.35);
            border-radius: 14px; padding: 9px 22px 11px;
            pointer-events: none; text-align: center;
            transition: opacity 0.5s;
            max-width: 480px;
        }
        #tut-step {
            color: rgba(255,190,60,0.5); font-size: 10px; letter-spacing: 0.12em;
            text-transform: uppercase; margin-bottom: 3px;
        }
        #tut-obj {
            color: rgba(255,220,130,0.95); font-size: 13px; line-height: 1.5;
        }
    </style>
</head>

<script>
// ── OrbitControls inline (r128 compatible) ──────────────────────────────
THREE.OrbitControls = function(camera, domElement) {
    this.camera = camera; this.domElement = domElement;
    this.target = new THREE.Vector3(0, 1.5, -2.5);
    this.enabled = true;
    var scope = this;
    var STATE = { NONE: -1, ROTATE: 0, DOLLY: 1, PAN: 2 };
    var state = STATE.NONE;
    var spherical = new THREE.Spherical();
    var sphericalDelta = new THREE.Spherical();
    var scale = 1;
    var rotateStart = new THREE.Vector2(), rotateEnd = new THREE.Vector2(), rotateDelta = new THREE.Vector2();
    var panStart  = new THREE.Vector2(), panEnd = new THREE.Vector2(), panDelta = new THREE.Vector2();
    var offset = new THREE.Vector3();
    var quat = new THREE.Quaternion().setFromUnitVectors(camera.up, new THREE.Vector3(0,1,0));
    var quatInverse = quat.clone().invert();
    var lastPos = new THREE.Vector3();
    offset.copy(camera.position).sub(scope.target);
    offset.applyQuaternion(quat);
    spherical.setFromVector3(offset);
    var _panLeft = function(distance) {
        var v = new THREE.Vector3(); v.setFromMatrixColumn(camera.matrix, 0);
        v.multiplyScalar(-distance); scope.target.add(v); camera.position.add(v);
    };
    var _panUp = function(distance) {
        var v = new THREE.Vector3(); v.setFromMatrixColumn(camera.matrix, 1);
        v.multiplyScalar(distance); scope.target.add(v); camera.position.add(v);
    };
    var _rotateLeft = function(angle) { sphericalDelta.theta -= angle; };
    var _rotateUp   = function(angle) { sphericalDelta.phi   -= angle; };
    var rotateSpeed = 1.0;
    var getAutoRotationAngle = function() { return 2 * Math.PI / 60 / 60 * 2.0; };
    domElement.addEventListener('mousedown', function(e) {
        e.preventDefault();
        if (e.button === 0) { state = STATE.ROTATE; rotateStart.set(e.clientX, e.clientY); }
    });
    domElement.addEventListener('mousemove', function(e) {
        if (!scope.enabled) return;
        if (state === STATE.ROTATE) {
            rotateEnd.set(e.clientX, e.clientY);
            rotateDelta.subVectors(rotateEnd, rotateStart).multiplyScalar(rotateSpeed);
            var element = domElement === document ? domElement.body : domElement;
            _rotateLeft(2 * Math.PI * rotateDelta.x / element.clientHeight);
            _rotateUp  (2 * Math.PI * rotateDelta.y / element.clientHeight);
            rotateStart.copy(rotateEnd);
        }
    });
    domElement.addEventListener('mouseup', function() { state = STATE.NONE; });
    domElement.addEventListener('wheel', function(e) {
        e.preventDefault();
        if (e.deltaY < 0) scale /= 0.95; else scale *= 0.95;
    }, { passive: false });
    this.update = function() {
        var position = scope.camera.position;
        offset.copy(position).sub(scope.target);
        offset.applyQuaternion(quat);
        spherical.setFromVector3(offset);
        spherical.theta += sphericalDelta.theta;
        spherical.phi   += sphericalDelta.phi;
        spherical.phi = Math.max(0.05, Math.min(Math.PI - 0.05, spherical.phi));
        spherical.radius = Math.max(1.0, Math.min(20.0, spherical.radius * scale));
        offset.setFromSpherical(spherical);
        offset.applyQuaternion(quatInverse);
        position.copy(scope.target).add(offset);
        scope.camera.lookAt(scope.target);
        sphericalDelta.set(0,0,0); scale = 1;
    };
};
</script>

(function aplicarCielo(cielo) {
    if (!cielo) return;
    scene.background = new THREE.Color(cielo.color_fondo);
    renderer.setClearColor(cielo.color_fondo);
    const intensidadAmb = (cielo.tipo === 'interior_luminoso')
        ? Math.min(cielo.intensidad_ambiente, 0.62)
        : cielo.intensidad_ambiente;
    scene.add(new THREE.AmbientLight(cielo.color_ambiente, intensidadAmb));
    const intensidadSol = Math.min(cielo.intensidad_sol, 1.2);
    const sol = new THREE.DirectionalLight(cielo.color_sol, intensidadSol);
    const p = cielo.pos_sol;
    sol.position.set(p.x, p.y, p.z);
    sol.castShadow = true;
    sol.shadow.mapSize.setScalar(1024);
    sol.shadow.camera.near = 0.5; sol.shadow.camera.far = 30;
    sol.shadow.camera.left = -9; sol.shadow.camera.right = 9;
    sol.shadow.camera.top = 9; sol.shadow.camera.bottom = -9;
    sol.shadow.bias = -0.001;
    scene.add(sol);
    if (cielo.niebla) scene.fog = new THREE.Fog(cielo.niebla.color, cielo.niebla.near, cielo.niebla.far);
})(CIELO_CONFIG ?? SCENE_GRAPH.cielo);

// Onboarding: el PRIMER gesto (clic o tecla) entra en modo inmersivo y captura el

// ── Pantalla completa (igual que el viewer real index.html) ─────────────────
// El .exe arranca en fullscreen de NAVEGADOR (--start-fullscreen). Si pedimos
// pointer lock en ese estado sin pasar antes por la Fullscreen API, Chrome entra
// en conflicto y la entrada a FPS se queda "pillada". Igual que index.html,
// re-entramos en Fullscreen API con el primer gesto (antes del click que captura
// el ratón), de modo que pointer lock conviva con el fullscreen como en el viewer.
(function _wwBotonFullscreen() {
    const btn = document.createElement('button');
    btn.id = 'ww-fs-btn';
    btn.title = 'Pantalla completa';
    btn.innerHTML = '⛶';
    btn.style.cssText = 'position:fixed;bottom:14px;left:14px;z-index:99999;width:40px;height:40px;'
        + 'border-radius:10px;border:1px solid rgba(255,255,255,0.22);background:rgba(15,20,35,0.55);'
        + 'color:#dce6f5;font-size:19px;line-height:1;cursor:pointer;display:none;'
        + 'backdrop-filter:blur(4px);transition:background .2s;';
    btn.onmouseover = () => { btn.style.background = 'rgba(40,55,90,0.8)'; };
    btn.onmouseout  = () => { btn.style.background = 'rgba(15,20,35,0.55)'; };
    btn.onclick = (e) => {
        e.stopPropagation();
        const el = document.documentElement;
        (el.requestFullscreen || el.webkitRequestFullscreen || el.msRequestFullscreen)?.call(el);
    };
    document.body.appendChild(btn);
    const upd = () => {
        const fs = document.fullscreenElement || document.webkitFullscreenElement;
        btn.style.display = fs ? 'none' : 'block';
    };
    document.addEventListener('fullscreenchange', upd);
    document.addEventListener('webkitfullscreenchange', upd);
    upd();
})();

(function _wwAutoFullscreen() {
    let hecho = false;
    const ir = () => {
        if (hecho) return;
        hecho = true;
        window.removeEventListener('pointerdown', ir, true);
        window.removeEventListener('keydown', ir, true);
        const fs = document.fullscreenElement || document.webkitFullscreenElement;
        if (!fs) {
            const el = document.documentElement;
            try { (el.requestFullscreen || el.webkitRequestFullscreen || el.msRequestFullscreen)?.call(el); }
            catch (e) { /* requiere gesto válido; si falla, queda el botón manual */ }
        }
    };
    window.addEventListener('pointerdown', ir, true);
    window.addEventListener('keydown', ir, true);
})();

renderer.domElement.addEventListener('mousemove', (e) => {

    mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
    raycaster.setFromCamera(mouse, camera);
    const hits = raycaster.intersectObjects(scene.children, true)
        .filter(h => h.object.parent?.userData?.id);
    if (hits.length > 0) {
        const nodo = hits[0].object.parent.userData;
        document.getElementById('tt-tipo').textContent  = nodo.tipo;
        document.getElementById('tt-nombre').textContent = nodo.nombre || nodo.id;
        tooltip.style.display = 'block';
        tooltip.style.left = (e.clientX + 14) + 'px';
        tooltip.style.top  = (e.clientY - 10) + 'px';
        renderer.domElement.style.cursor = 'pointer';
    } else {
        tooltip.style.display = 'none';
        renderer.domElement.style.cursor = 'default';
    }
});

function _reproducirSonidoPortal() {
    try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const t0 = ctx.currentTime;
        function _osc(type, f0, f1, vol, dur, delay) {
            const o = ctx.createOscillator(), g = ctx.createGain();
            o.type = type;
            o.frequency.setValueAtTime(f0, t0+delay);
            o.frequency.exponentialRampToValueAtTime(f1, t0+delay+dur);
            g.gain.setValueAtTime(0.001, t0+delay);
            g.gain.linearRampToValueAtTime(vol, t0+delay+dur*0.18);
            g.gain.exponentialRampToValueAtTime(0.001, t0+delay+dur);
            o.connect(g); g.connect(ctx.destination);
            o.start(t0+delay); o.stop(t0+delay+dur);
        }
        _osc('sine',     75,   1400, 0.30, 1.0, 0.0);
        _osc('triangle', 310,  3800, 0.14, 0.9, 0.05);
        _osc('sine',     1800, 10000,0.07, 0.55,0.42);
        const bufLen = Math.ceil(ctx.sampleRate * 1.0);
        const buf = ctx.createBuffer(1, bufLen, ctx.sampleRate);
        const d = buf.getChannelData(0);
        for (let i=0;i<bufLen;i++) d[i]=Math.random()*2-1;
        const src=ctx.createBufferSource(); src.buffer=buf;
        const filt=ctx.createBiquadFilter(); filt.type='bandpass';
        filt.frequency.setValueAtTime(280,t0); filt.frequency.exponentialRampToValueAtTime(7000,t0+1.0);
        filt.Q.value=1.1;
        const gn=ctx.createGain(); gn.gain.setValueAtTime(0.001,t0);
        gn.gain.linearRampToValueAtTime(0.22,t0+0.13);
        gn.gain.exponentialRampToValueAtTime(0.001,t0+1.0);
        src.connect(filt); filt.connect(gn); gn.connect(ctx.destination);
        src.start(t0); src.stop(t0+1.0);
    } catch(e) {}
}

function _reproducirSonidoLlegada() {
    try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const t0 = ctx.currentTime;
        function _osc(type, f0, f1, vol, dur, delay) {
            const o = ctx.createOscillator(), g = ctx.createGain();
            o.type = type;
            o.frequency.setValueAtTime(f0, t0+delay);
            o.frequency.exponentialRampToValueAtTime(f1, t0+delay+dur);
            g.gain.setValueAtTime(0.001, t0+delay);
            g.gain.linearRampToValueAtTime(vol, t0+delay+dur*0.08);
            g.gain.exponentialRampToValueAtTime(0.001, t0+delay+dur);
            o.connect(g); g.connect(ctx.destination);
            o.start(t0+delay); o.stop(t0+delay+dur);
        }
        _osc('sine', 1400, 75, 0.28, 0.85, 0.0);
        _osc('triangle', 3800, 310, 0.13, 0.75, 0.0);
        _osc('sine', 880, 880, 0.12, 0.35, 0.55);
    } catch(e) {}
}

window.spawnPortal = function() {
    if (_portalGrupo) return;
    const _c = { main:0xffaa33, emissive:0x552200, core:0xffeebb, ring:0xffcc44, light:0xff9922, particle:0xffddaa };
    const g = new THREE.Group();
    g.add(new THREE.Mesh(
        new THREE.SphereGeometry(0.72, 32, 32),
        new THREE.MeshPhongMaterial({color:_c.main, emissive:_c.emissive, emissiveIntensity:0.6, transparent:true, opacity:0.28, shininess:400, side:THREE.DoubleSide, depthWrite:false})
    ));
    g.add(new THREE.Mesh(
        new THREE.SphereGeometry(0.30, 16, 16),
        new THREE.MeshBasicMaterial({color:_c.core, transparent:true, opacity:0.65, depthWrite:false})
    ));
    const _matAnillo = new THREE.MeshBasicMaterial({color:_c.ring, transparent:true, opacity:0.55, side:THREE.DoubleSide, depthWrite:false});
    _portalAnillo1 = new THREE.Mesh(new THREE.TorusGeometry(0.82,0.04,8,64), _matAnillo);
    _portalAnillo2 = new THREE.Mesh(new THREE.TorusGeometry(0.82,0.03,8,64), _matAnillo.clone());
    _portalAnillo2.rotation.x = Math.PI / 2.2;
    g.add(_portalAnillo1); g.add(_portalAnillo2);
    _portalLuz = new THREE.PointLight(_c.light, 4.5, 7);
    g.add(_portalLuz);
    const N=90, _pos=new Float32Array(N*3);
    for (let i=0;i<N;i++) {
        const th=Math.random()*Math.PI*2, ph=Math.random()*Math.PI, r=0.88+Math.random()*0.55;
        _pos[i*3]=r*Math.sin(ph)*Math.cos(th); _pos[i*3+1]=r*Math.cos(ph); _pos[i*3+2]=r*Math.sin(ph)*Math.sin(th);
    }
    const geoP = new THREE.BufferGeometry();
    geoP.setAttribute('position', new THREE.BufferAttribute(_pos,3));
    g.add(new THREE.Points(geoP, new THREE.PointsMaterial({color:_c.particle, size:0.055, transparent:true, opacity:0.85, blending:THREE.AdditiveBlending, depthWrite:false, fog:false})));
    g.position.set(1.8, 1.5, -4.2);
    scene.add(g);
    _portalGrupo = g;
};

// ── Tutorial HUD ───────────────────────────────────────────────────────────
const _tutHud    = document.getElementById('tut-hud');
const _tutStep   = document.getElementById('tut-step');
const _tutObj    = document.getElementById('tut-obj');
// 4 fases: 0=primera charla, 1=segunda charla (explica pistas+pide globo), 2=recoger, 3=entregar
const _tutTextos = [
    { paso:'Paso 1 de 3', obj:'Muévete con WASD y el ratón · acércate a la Guía y pulsa E' },
    { paso:'Paso 1 de 3', obj:'Acércate otra vez a la Guía y pulsa E para hablar' },
    { paso:'Paso 2 de 3', obj:'Ve hasta el globo terráqueo ✦ y pulsa E para recogerlo (G para guardar)' },
    { paso:'Paso 3 de 3', obj:'Vuelve con la Guía y pulsa E para entregarle el globo' },
];
let _tutFaseVista = -1;

function _actualizarTutHUD() {
    const fase = interacciones?.getFase?.();
    if (fase === undefined || fase === _tutFaseVista) return;
    _tutFaseVista = fase;
    if (fase >= _tutTextos.length) {
        _tutHud.style.opacity = '0';
        setTimeout(() => { _tutHud.style.display = 'none'; }, 500);
    } else {
        _tutStep.textContent = _tutTextos[fase].paso;
        _tutObj.textContent  = _tutTextos[fase].obj;
        // Al entrar en fase 2 (recoger el globo): la Guía acaba de mencionar las pistas,
        // así que forzamos el tracker visible de inmediato. Se ocultará sólo cuando
        // interactions.js detecte que el globo fue recogido (comportamiento normal).
        if (fase === 2) {
            setTimeout(() => {
                const tracker = document.querySelector('.obj-tracker') || document.getElementById('obj-tracker');
                if (tracker) tracker.style.opacity = '1';
            }, 600);
        }
    }
}
setInterval(_actualizarTutHUD, 400);

// ── Render loop ────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

const _fpsForward = new THREE.Vector3();
const _fpsRight   = new THREE.Vector3();

const _llegadaPortal = new URLSearchParams(window.location.search).has('portal');
let _llegadaInicio = null;
const _DURACION_LLEGADA = 900;
if (_llegadaPortal) { _llegadaInicio = performance.now(); _reproducirSonidoLlegada(); }

let _lastAnimTime = performance.now() * 0.001;

function animate() {
    requestAnimationFrame(animate);
    const t     = performance.now() * 0.001;
    const delta = Math.min(t - _lastAnimTime, 0.1);
    _lastAnimTime = t;

    if (window.PersonajesManager) PersonajesManager.update(delta);
    interacciones.update();
    cieloDinamico.update(t);
    escenaDinamica.update(t);

    if (_portalGrupo) {
        if (!_portalActivado) {
            _portalGrupo.rotation.y += 0.007;
            if (_portalAnillo1) _portalAnillo1.rotation.z += 0.020;
            if (_portalAnillo2) _portalAnillo2.rotation.z -= 0.013;
            _portalGrupo.position.y = 1.5 + 0.18 * Math.sin(t * 0.85);
            if (_portalLuz) _portalLuz.intensity = 3.5 + 1.3 * Math.sin(t * 2.1);
            const _dx = camera.position.x - _portalGrupo.position.x;
            const _dz = camera.position.z - _portalGrupo.position.z;
            const _dist = Math.sqrt(_dx*_dx + _dz*_dz);
            if (_dist < 3.5) {
                _elPortalHint.style.display = 'block';
                _elPortalHint.style.opacity = Math.min(1, (3.5-_dist)/2.0).toFixed(2);
            } else {
                _elPortalHint.style.display = 'none';
            }
            if (_dist < 1.1 && fpsModo) {
                _portalActivado = true;
                _portalTransicionInicio = performance.now();
                _portalPosFinal = _portalGrupo.position.clone();
                _elPortalHint.style.display = 'none';
                _reproducirSonidoPortal();
            }
        } else if (_portalTransicionInicio !== null) {
            const elapsed  = performance.now() - _portalTransicionInicio;
            const progress = Math.min(elapsed / 1100, 1.0);
            const easeFast = Math.pow(progress, 2.0);
            const pull = 0.055 + easeFast * 0.18;
            camera.position.x += (_portalPosFinal.x - camera.position.x) * pull;
            camera.position.y += (_portalPosFinal.y - camera.position.y) * pull * 0.4;
            camera.position.z += (_portalPosFinal.z - camera.position.z) * pull;
            camera.fov = 55 + 120 * easeFast;
            camera.updateProjectionMatrix();
            _portalGrupo.scale.setScalar(1 + easeFast * 8);
            _portalGrupo.rotation.y  += 0.025 + easeFast * 0.25;
            if (_portalAnillo1) _portalAnillo1.rotation.z += 0.05 + easeFast * 0.35;
            if (_portalAnillo2) _portalAnillo2.rotation.z -= 0.04 + easeFast * 0.25;
            if (_portalLuz) _portalLuz.intensity = 5 + easeFast * 25;
            if (progress > 0.42) {
                const fp = Math.pow((progress-0.42)/0.58, 1.6);
                _elPortalFlash.style.opacity = Math.min(fp,1).toFixed(3);
            }
            if (progress >= 1.0) {
                // Tutorial del mundo COMPLETADO → ahora sí se borra el precinto de primera
                // vez (keepalive: la petición sobrevive a la navegación inmediata).
                fetch('/api/tutorial-visto', { method: 'POST', keepalive: true }).catch(() => {});
                window.location.href = NEXT_SCENE_URL + '?tutorial_done=1';
            }
        }
    }

    if (_llegadaInicio !== null) {
        const elapsed  = performance.now() - _llegadaInicio;
        const progress = Math.min(elapsed / _DURACION_LLEGADA, 1.0);
        const easeOut  = 1 - Math.pow(1-progress, 3);
        camera.fov = 130 - 75 * easeOut;
        camera.updateProjectionMatrix();
        _elPortalFlash.style.opacity = (1-easeOut).toFixed(3);
        if (progress >= 1.0) {
            camera.fov = 55; camera.updateProjectionMatrix();
            _elPortalFlash.style.opacity = '0';
            _llegadaInicio = null;
        }
    }

    if (fpsModo) {
        camera.rotation.set(fpsPitch, fpsYaw, 0, 'YXZ');
        _fpsForward.set(-Math.sin(fpsYaw), 0, -Math.cos(fpsYaw));
        _fpsRight.set(Math.cos(fpsYaw), 0, -Math.sin(fpsYaw));
        if (document.pointerLockElement && !window._wwDialogoAbierto?.()) {
            if (fpsKeys['ArrowUp']   || fpsKeys['KeyW']) camera.position.addScaledVector(_fpsForward,  FPS_VELOCIDAD);
            if (fpsKeys['ArrowDown'] || fpsKeys['KeyS']) camera.position.addScaledVector(_fpsForward, -FPS_VELOCIDAD);
            if (fpsKeys['ArrowLeft'] || fpsKeys['KeyA']) camera.position.addScaledVector(_fpsRight,   -FPS_VELOCIDAD);
            if (fpsKeys['ArrowRight']|| fpsKeys['KeyD']) camera.position.addScaledVector(_fpsRight,    FPS_VELOCIDAD);
        }
        camera.position.y = FPS_ALTURA;
        // Límite circular para exterior
        const _limR = SCENE_GRAPH.limite_jugador ?? 6.5;
        const _dxz = Math.sqrt(camera.position.x**2 + camera.position.z**2);
        if (_dxz > _limR) { const _f = _limR / _dxz; camera.position.x *= _f; camera.position.z *= _f; }
    } else {
        controls.update();
    }

    renderer.render(scene, camera);
}
animate();
</script>
